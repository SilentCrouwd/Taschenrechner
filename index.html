<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Taschenrechner</title>
    <link rel="stylesheet" href="stylesheet.css" />
  </head>
  <!-- ############## MainBereich ##############-->
  <body>
    <div id="taschenrechner" class="taschenrechner">
      <input type="text" id="display" />
      <!-- ---------- Buttons Nummern  ------------->

      <div class="num-grid">
        <button class="num-btn" id="one">1</button>
        <button class="num-btn" id="two">2</button>
        <button class="num-btn" id="three">3</button>
        <button class="num-btn" id="foure">4</button>
        <button class="num-btn" id="five">5</button>
        <button class="num-btn" id="siix">6</button>
        <button class="num-btn" id="seven">7</button>
        <button class="num-btn" id="aight">8</button>
        <button class="num-btn" id="nine">9</button>
        <button class="num-btn" id="point">.</button>
        <button class="num-btn" id="null">0</button>

        <button class="num-btn" id="equal">=</button>
      </div>
      <!-- ---------- Buttons Operatoren  ------------->

      <div class="zeichen-grid">
        <button class="num-btn btn-plus">+</button>
        <button class="num-btn btn-minus">-</button>
        <button class="num-btn btn-mal">*</button>
        <button class="num-btn btn-geteilt">/</button>
      </div>
      <button class="num-btn prozent" id="prozent">%</button>
      <button class="num-btn pi">PI</button>
      <button class="num-btn clear" id="clear" value="C">C</button>

      <!-- ---------- Buttons Theme  ------------->

      <div class="theme-grid">
        <button class="btnBackground" id="backgoundOne">Theme1</button>
        <button class="btnBackground" id="backgounTwo">Theme2</button>
        <button class="btnBackground" id="backgoundThree">Theme3</button>
        <button class="btnBackground" id="backgoundThree">Theme4</button>
        <button class="btnBackground" id="backgoundThree">Default</button>
      </div>
     <!-- ---------- Formeln Nummern  ------------->

      <div class="formel-grid">
        <button class="formel-btn">Quadrat</button>
        <button class="formel-btn">Rechteck</button>
        <button class="formel-btn">Kreis</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
