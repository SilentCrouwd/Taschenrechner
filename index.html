<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="stylesheet.css" />
  </head>

  <body>
    <div id="taschenrechner" class="taschenrechner">
      <input type="text" id="display" />
      <div class="num-grid">
        <button class="num-btn" id="one">1</button>
        <button class="num-btn" id="two">2</button>
        <button class="num-btn" id="three">3</button>
        <button class="num-btn" id="foure">4</button>
        <button class="num-btn" id="five">5</button>
        <button class="num-btn" id="siix">6</button>
        <button class="num-btn" id="seven">7</button>
        <button class="num-btn" id="aight">8</button>
        <button class="num-btn" id="nine">9</button>
        <button class="num-btn" id="point">.</button>
        <button class="num-btn" id="null">0</button>

        <button class="num-btn" id="equal" >=</button>
      </div>
      <div class="zeichen-grid">
        <button class="num-btn btn-plus">+</button>
        <button class="num-btn btn-minus">-</button>
        <button class="num-btn btn-mal">*</button>
        <button class="num-btn btn-geteilt">/</button>
      </div>
      <button class="num-btn prozent" id="prozent">%</button>>
      <button class="num-btn clear" id="clear" value="C">C</button>

      <!-- <select name="cheating" id="cheating">
        <option id="ausgangswert" value="cheat">Formel</option>
        <option id="rechteck" value="rechteck">Rechteck</option>
        <option id="kreis" value="kreis">Kreis</option>
        <option id="quadrat" value="quadrat">Quadrat</option>
      </select> -->
      <div class="theme-grid">
        <button onclick="backgroundchange('1')" id="backgoundOne">
          Theme1
        </button>
        <button onclick="backgroundchange('2')" id="backgounTwo">Theme2</button>
        <button onclick="backgroundchange('3')" id="backgoundThree">
          Theme3
        </button>
        <button onclick="backgroundchange('4')" id="backgoundThree">
          Fehler
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
